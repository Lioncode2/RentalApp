name: Build and Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Install MAUI workload
      run: dotnet workload install maui-android

    - name: Restore dependencies
      run: dotnet restore StarterApp.Test/StarterApp.Test.csproj

    - name: Build test project
      run: dotnet build StarterApp.Test/StarterApp.Test.csproj --no-restore

    - name: Run Tests
      run: dotnet test StarterApp.Test/StarterApp.Test.csproj --no-build --verbosity normal
